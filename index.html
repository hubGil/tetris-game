<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="./src/styles/main.scss">
</head>
<body>
  <h1>TETRIS Do Nicolas</h1>
  <div class="game-wrapper">
    <div class="game-area">
      <canvas id="tetris" width="240" height="400"></canvas>
      <div id="game-over" class="overlay hidden">
        <div class="overlay-content">
          <h2>FIM DE JOGO</h2>
          <p class="record-msg" data-record-msg></p>
          <p class="final-score">Score: <strong data-final-score>0</strong></p>
          <button id="play-again">JOGAR NOVAMENTE</button>
        </div>
      </div>
    </div>
    <aside class="sidebar">
      <div class="info-block">
        <span class="label">SCORE</span>
        <div id="score">0</div>
      </div>
      <div class="info-block">
        <span class="label">MELHOR</span>
        <div id="highscore">0</div>
      </div>
      <div class="info-block">
        <span class="label">LEVEL</span>
        <div id="level">1</div>
      </div>
      <div class="info-block">
        <span class="label">NEXT</span>
        <canvas id="preview" width="120" height="120"></canvas>
      </div>
      <button id="restart">RESTART</button>
      <div class="info-block">
        <span class="label">ÚLTIMOS</span>
        <ol id="scores"></ol>
      </div>
    </aside>
  </div>
  <div id="controls">
    ← → move &nbsp;|&nbsp; ↓ drop &nbsp;|&nbsp; Space hard drop &nbsp;|&nbsp; Q/W rotate &nbsp;|&nbsp; P pause
  </div>
  <script type="module" src="./src/index.js"></script>
</body>
</html>
